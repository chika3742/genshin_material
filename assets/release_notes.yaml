- releasedOn: 2024/11/30
  version: 4.2.0
  contents:
    locales:
      ja: |
        # 機能追加
        - ブックマーク自動解除機能追加！キャラページもしくは武器ページを開いた際、すでに育成を完了した素材ブックマークを自動的に解除します。
          - キャラページを開いた際はキャラクターの、武器ページを開いた際は選択したキャラクターとその武器のブックマークが解除されます。それぞれブックマークページのキャラ・武器アイコンからジャンプできます。
        # 機能改善
        - ブックマーク素材リストにおいて、素材がカテゴリーごとにまとまって表示されるように改善しました。
      en: |
        # New Features
        - Added an auto-unbookmark feature! When you open a character page or weapon page, material bookmarks whose farming is already complete are automatically removed.
          - When you open a character page, the character's bookmarks are removed; when you open a weapon page, the selected character's and its weapon's bookmarks are removed. You can jump to each from the character/weapon icons on the Bookmarks page.
        # Improvements
        - Improved the bookmarked material list so that materials are grouped and displayed by category.

- releasedOn: 2024/11/29
  version: 4.1.0
  contents:
    locales:
      ja: |
        # 機能追加
        - ブックマークページに「素材」タブ追加！ブックマークした素材のリストを確認できます。
        # 機能削除
        - 大変申し訳ありませんが、バッグ内の不足数同期機能について、APIの仕様変更により正しい値を取得することが困難となったため、削除させていただきました。ご了承ください。
        # 不具合修正
        - 武器EXP素材をブックマークした際、ブックマーク一覧にキャラEXP素材が表示される不具合の修正
        - 素材カードの日替わり素材アイコン表示に、サーバー時間設定が反映されない不具合の修正
      en: |
        # New Features
        - Added a "Materials" tab to the Bookmarks page! You can check the list of bookmarked materials.
        # Removed Features
        - We sincerely apologize, but we have removed the bag shortage count sync function, as it has become difficult to retrieve correct values due to changes in the API specifications. Thank you for your understanding.
        # Bug Fixes
        - Fixed a bug where character EXP materials were shown in the bookmark list when bookmarking weapon EXP materials.
        - Fixed a bug where the server time setting was not reflected in the daily material icon display on material cards.

- releasedOn: 2024/11/22
  version: 4.0.2
