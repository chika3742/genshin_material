- releasedOn: 2025/08/21
  version: 4.5.0
  contents:
    locales:
      ja: |
        # 機能追加
        - 調度品関連機能を追加しました。
          - 調度品セットにおける調度品の作成状況をカウント・記録できます。
          - ブックマークも可能で、ブックマークタブに表示できます。
        - 検索機能を追加しました。キャラクター、武器、聖遺物、素材、調度品セット、調度品の一覧ページで検索ボタンをタップすることで検索UIが表示されます。

        # 調整
        - キャラクターリストページの絞り込みボタンを固定しました。

        # 不具合修正
        - HoYoLAB未連携時、武器詳細ページが正しく表示されない不具合を修正しました。
      en: |
        # New Features
        - Added furnishing-related features.
          - You can count and record the crafting progress of furnishings within a furnishing set.
          - Bookmarking is also supported, and bookmarks can be shown in the Bookmarks tab.
        - Added a search function. The search UI is displayed by tapping the search button on the list pages for characters, weapons, artifacts, materials, furnishing sets, and furnishings.

        # Adjustments
        - Fixed the filter button in place on the character list page.

        # Bug Fixes
        - Fixed a bug where the weapon details page was not displayed correctly when HoYoLAB was not linked.

- releasedOn: 2025/08/05
  version: 4.4.0
  contents:
    locales:
      ja: |
        # 機能追加
        - ゲーム内バッグ不足数の同期機能を復活させました。
          - 以前までと異なり、アイテムの所持数は確認できません。不足数のみ確認可能です。
          - 実装が困難なため、ブックマーク一覧においては不足数が表示されません。キャラや武器の詳細画面に遷移してご確認ください。
        - ブックマークするレベルを1Lv単位で調整できるように改善しました。
          - **以前までのバージョンでブックマークしたものが正しく表示されなくなります。**詳細ページで緑色のブックマークボタンをタップし、再度ブックマークを行ってください。

        # 調整・不具合修正
        - スライダーのラベル（数字）が正確な位置に描画されるように改善しました。
        - 同じキャラクター及び武器のレベルの同期を、3分に1回に制限しました。
        - Xへのリンクを追加しました。
        - 旅人が常に未所持キャラとして表示される不具合を修正しました。
        - シトラリ以降のキャラクターの育成状況を取得できない問題を修正しました。
        - （Android版のみ）アプリアイコンを変更しました。

        # 既知の問題
        - （Androidのみ）吹き出しなどのモーダル画面を表示した後にバックキーを入力すると、前の画面に戻らずアプリが終了してしまう問題が存在します(flutter/flutter#153672)。左上の戻るボタンから前の画面に戻っていただきますようお願いします。
      en: |
        # New Features
        - Restored the sync function for in-game bag shortage counts.
          - Unlike before, you cannot check the number of items you own. Only the shortage count is available.
          - Due to implementation difficulties, the shortage count is not displayed in the bookmark list. Please navigate to the character or weapon details screen to check it.
        - Improved the bookmark level so it can now be adjusted in increments of 1 level.
          - **Items bookmarked in previous versions will no longer be displayed correctly.** Please tap the green bookmark button on the details page and bookmark them again.

        # Adjustments & Bug Fixes
        - Improved slider labels (numbers) so they are drawn at the correct position.
        - Limited the level sync for the same character and weapon to once every 3 minutes.
        - Added a link to X.
        - Fixed a bug where the Traveler was always displayed as an unowned character.
        - Fixed an issue where the progress status of characters from Citlali onward could not be retrieved.
        - (Android only) Changed the app icon.

        # Known Issues
        - (Android only) There is an issue where pressing the back key after displaying a modal screen such as a popup causes the app to close instead of returning to the previous screen (flutter/flutter#153672). Please use the back button at the top left to return to the previous screen.

