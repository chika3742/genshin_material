$schema: https://json-schema.org/draft-07/schema

type: array
items:
  type: object
  additionalProperties: false
  properties:
    releasedOn:
      type: string
      pattern: '^\d{4}/\d{2}/\d{2}$'
    version:
      type: string
      pattern: '^\d+\.\d+\.\d+$'
    contents:
      type: object
      additionalProperties: false
      properties:
        locales:
          type: object
          additionalProperties:
            type: string
      required:
        - locales
  required:
    - releasedOn
